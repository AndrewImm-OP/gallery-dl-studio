appId: com.gallery-dl-studio.app
productName: Gallery-DL Studio
copyright: Copyright © 2024

directories:
  buildResources: resources
  output: release

files:
  - dist
  - dist-electron

extraMetadata:
  main: dist-electron/main/index.js

linux:
  target:
    - AppImage
    - deb
  category: Utility
  icon: resources/icon.png
  maintainer: noreply@gallery-dl-studio.local

win:
  target:
    - nsis
    - portable
  icon: resources/icon.ico

mac:
  target:
    - dmg
  icon: resources/icon.png
  category: public.app-category.utilities

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true

dmg:
  contents:
    - x: 410
      y: 150
      type: link
      path: /Applications
    - x: 130
      y: 150
      type: file

appId: com.gallery-dl-studio.app
productName: Gallery-DL Studio
copyright: Copyright © 2026 AndrewImm-OP

directories:
  buildResources: resources
  output: release

files:
  - dist
  - dist-electron

extraMetadata:
  main: dist-electron/main/index.js

linux:
  target:
    - AppImage
    - deb
  category: Network;FileTransfer;Graphics
  icon: resources/icon.png
  maintainer: AndrewImm-OP <bessmertnyja89@gmail.com>
  vendor: AndrewImm-OP
  desktop:
    StartupWMClass: Gallery-DL Studio
    Keywords: gallery;download;images;media;gallery-dl;yt-dlp;

deb:
  priority: optional
  depends:
    - libgtk-3-0
    - libnotify4
    - libnss3
    - libxss1
    - libxtst6
    - xdg-utils
    - libatspi2.0-0
    - libuuid1
    - libsecret-1-0
  recommends:
    - gallery-dl
    - yt-dlp

win:
  target:
    - nsis
    - portable
  icon: resources/icon.ico

mac:
  target:
    - dmg
  icon: resources/icon.png
  category: public.app-category.utilities

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true

dmg:
  contents:
    - x: 410
      y: 150
      type: link
      path: /Applications
    - x: 130
      y: 150
      type: file

<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="50%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="frame" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.75"/>
    </linearGradient>
    <linearGradient id="mountain" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="arrow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="4" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.35"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Rounded background -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bg)"/>

  <!-- Back picture frame -->
  <g filter="url(#shadow)">
    <rect x="96" y="120" width="280" height="220" rx="20" ry="20" fill="url(#frame)" stroke="#ffffff" stroke-width="3" opacity="0.85"/>
  </g>

  <!-- Front picture frame with image content -->
  <g filter="url(#shadow)">
    <rect x="136" y="160" width="280" height="220" rx="20" ry="20" fill="url(#frame)" stroke="#ffffff" stroke-width="3"/>
    <!-- Sun/circle -->
    <circle cx="200" cy="220" r="22" fill="#f59e0b"/>
    <!-- Mountains -->
    <path d="M 156 360 L 156 320 L 220 250 L 280 310 L 330 270 L 396 360 Z" fill="url(#mountain)"/>
    <path d="M 156 360 L 156 340 L 200 300 L 250 340 L 300 310 L 396 360 Z" fill="#ec4899" opacity="0.85"/>
  </g>

  <!-- Download arrow badge -->
  <g filter="url(#shadow)">
    <circle cx="396" cy="396" r="72" fill="url(#arrow)" stroke="#ffffff" stroke-width="6"/>
    <!-- Arrow shaft -->
    <rect x="386" y="350" width="20" height="50" rx="4" fill="#ffffff"/>
    <!-- Arrow head -->
    <path d="M 360 395 L 396 435 L 432 395 Z" fill="#ffffff"/>
    <!-- Base line -->
    <rect x="358" y="430" width="76" height="10" rx="4" fill="#ffffff"/>
  </g>
</svg>
